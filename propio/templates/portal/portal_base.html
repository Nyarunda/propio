<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propio - {% block title %}Portal{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/assets/frappe/images/frappe-favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { background-color: #f5f7fa; }
        .navbar-brand { font-weight: 700; color: #1a4d8c !important; }
        .card { border-radius: 12px; }
        .portal-shell { min-height: calc(100vh - 120px); }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fa fa-building"></i> Propio</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/app">Desk</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="portal-shell">
{% block content %}{% endblock %}
</main>

<footer class="py-4 text-center text-muted">
    <small>&copy; 2026 Propio</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
window.frappe = window.frappe || {};
frappe.csrf_token = "{{ frappe.session.csrf_token }}";
</script>
{% block scripts %}{% endblock %}
</body>
</html>
